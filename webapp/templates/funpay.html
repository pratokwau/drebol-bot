{% extends "base.html" %}
{% block content %}
<header class="page-head">
  <h1>FunPay</h1>
  <p>Только данные аккаунта для работы с API.</p>
</header>

<section class="panel">
  <h2>Данные аккаунта</h2>
  <form method="post" action="/funpay/account" class="form-grid">
    <label>Golden Key<input name="gk" value="{{ gk }}" autocomplete="off"></label>
    <label>User-Agent<input name="ua" value="{{ ua }}" autocomplete="off"></label>
    <button type="submit">Сохранить</button>
  </form>
</section>
{% endblock %}
