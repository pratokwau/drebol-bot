{% extends "base.html" %}
{% block title %}Расчёт · Drebolbot{% endblock %}
{% block content %}
<header class="page-head">
  <h1>Расчёт</h1>
  <p>Калькуляторы прибыли для FunPay и PlayerOK.</p>
</header>

<div style="display:flex;gap:8px;margin-bottom:20px;">
  <button id="sub-fp" onclick="showCalc('fp')" style="background:var(--accent);font-size:13px;padding:8px 18px;">🧮 FunPay</button>
  <button id="sub-po" onclick="showCalc('po')" class="ghost" style="font-size:13px;padding:8px 18px;">🧮 PlayerOK</button>
</div>

<!-- FunPay -->
<section id="calc-fp" class="panel">
  <h2>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px;"><circle cx="12" cy="12" r="10"></circle><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path><path d="M12 18V6"></path></svg>
    Расчёт FunPay
  </h2>
  <div class="form-grid" style="margin-bottom:16px;">
    <label>Комиссия (%)
      <input id="fp-commission" type="number" step="0.01" value="3" oninput="calcFP()">
    </label>
    <div></div>
    <label>Закупка (₽)
      <input id="fp-buy" type="number" step="0.01" placeholder="1500" oninput="calcFP()">
    </label>
    <label>Продажа (₽)
      <input id="fp-sell" type="number" step="0.01" placeholder="2200" oninput="calcFP()">
    </label>
  </div>
  <div id="fp-result" style="display:none;">
    <div style="border-top:1px solid var(--border);padding-top:16px;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center;">
        <div>
          <div style="color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Комиссия</div>
          <div id="fp-comm-val" style="font-size:22px;font-weight:700;color:var(--yellow);margin-top:4px;">0 ₽</div>
        </div>
        <div>
          <div style="color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Получишь</div>
          <div id="fp-after-val" style="font-size:22px;font-weight:700;color:var(--ink);margin-top:4px;">0 ₽</div>
        </div>
        <div>
          <div style="color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Прибыль</div>
          <div id="fp-profit-val" style="font-size:22px;font-weight:700;color:var(--green);margin-top:4px;">0 ₽</div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- PlayerOK -->
<section id="calc-po" class="panel" style="display:none;">
  <h2>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px;"><circle cx="12" cy="12" r="10"></circle><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path><path d="M12 18V6"></path></svg>
    Расчёт PlayerOK
  </h2>
  <div class="form-grid" style="margin-bottom:16px;">
    <label>Комиссия продажи (%)
      <input id="po-sale" type="number" step="0.01" value="10" oninput="calcPO()">
    </label>
    <label>Комиссия вывода (%)
      <input id="po-withdraw" type="number" step="0.01" value="5" oninput="calcPO()">
    </label>
    <label>Закупка (₽)
      <input id="po-buy" type="number" step="0.01" placeholder="1500" oninput="calcPO()">
    </label>
    <label>Продажа (₽)
      <input id="po-sell" type="number" step="0.01" placeholder="2000" oninput="calcPO()">
    </label>
  </div>
  <div id="po-result" style="display:none;">
    <div style="border-top:1px solid var(--border);padding-top:16px;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;text-align:center;">
        <div>
          <div style="color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Продажа − %</div>
          <div id="po-after-sale" style="font-size:20px;font-weight:700;color:var(--yellow);margin-top:4px;">0 ₽</div>
        </div>
        <div>
          <div style="color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Вывод − %</div>
          <div id="po-after-withdraw" style="font-size:20px;font-weight:700;color:var(--yellow);margin-top:4px;">0 ₽</div>
        </div>
        <div>
          <div style="color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Итого</div>
          <div id="po-net" style="font-size:20px;font-weight:700;color:var(--ink);margin-top:4px;">0 ₽</div>
        </div>
        <div>
          <div style="color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Прибыль</div>
          <div id="po-profit-val" style="font-size:20px;font-weight:700;color:var(--green);margin-top:4px;">0 ₽</div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
  function showCalc(type) {
    document.getElementById('calc-fp').style.display = type === 'fp' ? '' : 'none';
    document.getElementById('calc-po').style.display = type === 'po' ? '' : 'none';
    document.getElementById('sub-fp').style.background = type === 'fp' ? 'var(--accent)' : 'transparent';
    document.getElementById('sub-fp').style.color = type === 'fp' ? '#fff' : 'var(--ink-2)';
    document.getElementById('sub-fp').style.borderColor = type === 'fp' ? 'transparent' : 'var(--border)';
    document.getElementById('sub-po').style.background = type === 'po' ? 'var(--accent)' : 'transparent';
    document.getElementById('sub-po').style.color = type === 'po' ? '#fff' : 'var(--ink-2)';
    document.getElementById('sub-po').style.borderColor = type === 'po' ? 'transparent' : 'var(--border)';
  }
  function fmt(n) { return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' ₽'; }
  function calcFP() {
    var c = parseFloat(document.getElementById('fp-commission').value) || 0;
    var b = parseFloat(document.getElementById('fp-buy').value) || 0;
    var s = parseFloat(document.getElementById('fp-sell').value) || 0;
    if (b <= 0 || s <= 0) { document.getElementById('fp-result').style.display = 'none'; return; }
    var cv = s * c / 100, af = s - cv, pr = af - b;
    document.getElementById('fp-comm-val').textContent = fmt(cv);
    document.getElementById('fp-after-val').textContent = fmt(af);
    var el = document.getElementById('fp-profit-val');
    el.textContent = fmt(pr); el.style.color = pr > 0 ? 'var(--green)' : pr < 0 ? 'var(--red)' : 'var(--ink)';
    document.getElementById('fp-result').style.display = '';
  }
  function calcPO() {
    var sc = parseFloat(document.getElementById('po-sale').value) || 0;
    var wc = parseFloat(document.getElementById('po-withdraw').value) || 0;
    var b = parseFloat(document.getElementById('po-buy').value) || 0;
    var s = parseFloat(document.getElementById('po-sell').value) || 0;
    if (b <= 0 || s <= 0) { document.getElementById('po-result').style.display = 'none'; return; }
    var as = s - (s * sc / 100), aw = as - (as * wc / 100), pr = aw - b;
    document.getElementById('po-after-sale').textContent = fmt(as);
    document.getElementById('po-after-withdraw').textContent = fmt(aw);
    document.getElementById('po-net').textContent = fmt(aw);
    var el = document.getElementById('po-profit-val');
    el.textContent = fmt(pr); el.style.color = pr > 0 ? 'var(--green)' : pr < 0 ? 'var(--red)' : 'var(--ink)';
    document.getElementById('po-result').style.display = '';
  }
</script>
{% endblock %}
