<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход · Drebolbot</title>
  <link rel="stylesheet" href="/static/app.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <div class="login-mark">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        Drebolbot
      </div>
      <h1>Вход в панель</h1>
      <p>Управление заказами, FunPay и прибылью.</p>
      {% if error %}
        <div class="alert">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <label>Логин
          <input name="username" autocomplete="username" autofocus placeholder="admin">
        </label>
        <label>Пароль
          <input name="password" type="password" autocomplete="current-password" placeholder="••••••••">
        </label>
        <button type="submit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
          Войти
        </button>
      </form>
    </section>
  </main>
</body>
</html>
